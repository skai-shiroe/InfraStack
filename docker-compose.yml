services:

  redis:
    image: redis:7-alpine
    container_name: infrastack-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17

    container_name: infrastack-postgres

    environment:
      POSTGRES_DB: infrastack
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: skai

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  redis_data:
