# Redirection HTTP -> HTTPS
server {
    listen 80;
    server_name localhost;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name localhost;

    # TLS (certificat self-signed pour le développement)
    ssl_certificate /etc/nginx/certs/inventra.crt;
    ssl_certificate_key /etc/nginx/certs/inventra.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Headers de sécurité
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy no-referrer;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()";

    # Compression gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Frontend (React build)
    root /usr/share/nginx/html;
    index index.html;

    # API Proxy (toutes les routes API)
    location ~ ^/(api|auth|users|stock|categories|suppliers|clients|sales|dashboard|metrics|health|db-check|docs|openapi.json) {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "$http_authorization";
        proxy_redirect off;
    }

    # Frontend static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Endpoint health (internal)
    location /nginx-health {
        access_log off;
        add_header Content-Type text/plain always;
        return 200 "healthy\n";
    }
}